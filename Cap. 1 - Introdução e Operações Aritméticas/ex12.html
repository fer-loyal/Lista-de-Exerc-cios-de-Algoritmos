<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex. 12</title>
</head>
<body>
    <div>Insira seu peso e altura:</div>
    <input type="text" id="ipt_peso" placeholder="peso">
    <input type="text" id="ipt_altura" placeholder="altura">
    <br><br>
    <button onclick="calcular()">Calcular IMC</button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function calcular() {
        let peso = Number(ipt_peso.value);
        let altura = Number(ipt_altura.value);

        let imc = peso / (altura**2);
        
        resultado.innerHTML = `Seu imc é ${imc}`;
    }
</script>
</html>
