<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex. 13</title>
</head>
<body>
    <button onclick="receber100()">Receber 100</button>
    <br>

    <button onclick="pagar50()">Pagar 50</button>
    <br><br><br>

    <div id="resultado"></div>

</body>
<script>
    let saldo = 0;

    function receber100() {
        saldo = saldo + 100;

        resultado.innerHTML += `Transferência de R$100 recebida! <br> Saldo atual: <b>R$${saldo}</b> <hr>`;
    }

    function pagar50() {
        saldo = saldo - 50;

        resultado.innerHTML += `Pagamento de R$50 efetuado! <br> Saldo atual: <b>R$${saldo}</b> <hr>`;
    }
</script>
</html>
