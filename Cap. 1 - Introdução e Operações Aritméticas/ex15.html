<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex. 15</title>
</head>
<body>
    <div>Insira a quantidade de votos dos candidatos:</div>
    <input type="text" id="ipt_candidato1" placeholder="Candidato 1">   
    <input type="text" id="ipt_candidato2" placeholder="Candidato 2"> <br> <br>
    
    <div>Insira a quantidade de votos brancos e nulos:</div>
    <input type="text" id="ipt_brancos" placeholder="Votos brancos">
    <input type="text" id="ipt_nulos" placeholder="Votos nulos"><br><br>

    <button onclick="resultadoEleicao()">Resultado da Eleição</button>

    <div id="resultado"></div>

</body>
<script>
    function resultadoEleicao() {
        let cand1 = Number(ipt_candidato1.value);
        let cand2 = Number(ipt_candidato2.value);
        let brancos = Number(ipt_brancos.value);
        let nulos = Number(ipt_nulos.value);

        let total = cand1 + cand2 + brancos + nulos;

        let porcentagemCand1 = (cand1 / total) * 100;
        let porcentagemCand2 = (cand2 / total) * 100;

        let invalidos = brancos + nulos;
        let porcentagemInvalidos = (invalidos / total) * 100;

        resultado.innerHTML = `
        Total de votos: ${total}<br>
        Candidato A: ${porcentagemCand1}% (${cand1} votos) <br>
        Candidato B: ${porcentagemCand2}% (${cand2} votos) <br>
        Inválidos: ${porcentagemInvalidos}% (${invalidos} votos) 
        `;

    }
</script>
</html>
