<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>Informe sua frequência</div>
    <input type="text" id="ipt_frequencia" placeholder="frequência do aluno">

    <br><br>

    <button onclick="analisar()">Analisar frequência</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function analisar() {
        let frequencia = Number(ipt_frequencia.value);

        if (frequencia < 50) {
            resultado.innerHTML = `<img src="https://www.atrnp.com.br/blog/13-de-junho-dia-do-turista" width="150">
            `;
        }

        else {
            resultado.innerHTML = `<img src="https://horario.com.br/wp-content/uploads/2019/09/01_geha_blog_enem.jpg" width="150">
            `;
        }
    }
</script>
</html>
