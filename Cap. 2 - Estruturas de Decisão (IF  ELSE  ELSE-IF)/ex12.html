<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="ipt_nota1" placeholder="nota 1">
    <input type="text" id="ipt_nota2" placeholder="nota 2">

    <br><br>

    <button onclick="verificar()">Verificar situação</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function verificar() {
        let nota1 = Number(ipt_nota1.value);
        let nota2 = Number(ipt_nota2.value);
        let media = (nota1 + nota2) / 2;

        if (media >= 6) {
            resultado.innerHTML = `Parabéns, aprovado! `;
        }

        else {
            resultado.innerHTML = `Tente outra vez... `;
        }
    }
</script>
</html>
