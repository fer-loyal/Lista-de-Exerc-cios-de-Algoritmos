<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Insira sua nota aqui:</label>
    <input type="text" id="ipt_nota">

    <br><br>

    <button onclick="analisar()">Ver Analise</button>
    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function analisar() {
        let nota = Number(ipt_nota.value);

        if (nota < 5) {
            resultado.innerHTML = `Aluno precisa de muita ajuda`;
        }

        else if ( nota <= 7 ) {
            resultado.innerHTML = `Aluno na média`;
        }

        else if ( nota <= 9.5) {
            resultado.innerHTML = `Aluno acima da média`;
        }

        else {
            resultado.innerHTML = `Aluno fora da curva`;
        }
    }
</script>
</html>
