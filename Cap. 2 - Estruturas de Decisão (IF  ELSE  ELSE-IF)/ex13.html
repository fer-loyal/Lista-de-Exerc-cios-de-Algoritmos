<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="ipt_altura" placeholder="sua altura ex: 1.75">

    <br><br>

    <button onclick="analisarEstatura()">Analisar Estatura</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function analisarEstatura() {
        let altura = Number(ipt_altura.value);

        if (altura <= 1.65) {
            resultado.innerHTML = `Você pode ser piloto de corrida`;
        }

        else if (altura <= 1.80) {
            resultado.innerHTML = `Você pode ser jogador de futebol`;
        }

        else {
            resultado.innerHTML = `Você pode ser jogador de vôlei ou basquete`;
        }
    }
</script>
</html>
