<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Qual o saldo da sua conta?</label>
    <input type="text" id="ipt_saldo">

    <br>

    <label>Qual o débito a ser retirado?</label>
    <input type="text" id="ipt_debito">

    <br><br>

    <button onclick="analisar()">Analisar conta</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function analisar() {
        let saldo = Number(ipt_saldo.value);
        let debito = Number(ipt_debito.value);

        let novoSaldo = saldo - debito;

        if (novoSaldo > 0) {
            resultado.innerHTML = `O saldo atual da conta corrente é $${novoSaldo}`;
        }

        else {
            resultado.innerHTML = ` <p style="color: red"> <b> O saldo atual da conta corrente é $${novoSaldo} </b> </p> `;
        }
    }
</script>
</html>
