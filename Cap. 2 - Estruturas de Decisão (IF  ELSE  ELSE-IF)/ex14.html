<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Insira sua renda familiar mensal:</label>
    <input type="text" id="ipt_renda_familiar">

    <br><br>

    <button onclick="analisarRenda()">Analisar Renda</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function analisarRenda() {
        let renda = Number(ipt_renda_familiar.value);

        if (renda <= 250) {
            resultado.innerHTML = `Classe E`;
        }

        else if (renda <= 900) {
            resultado.innerHTML = `Classe D`;
        }

        else if (renda <= 2500) {
            resultado.innerHTML = `Classe C`;
        }

        else if (renda <= 9500) {
            resultado.innerHTML = `Classe B`;
        }

        else {
            resultado.innerHTML = `Classe A`;
        }
    }

</script>
</html>
