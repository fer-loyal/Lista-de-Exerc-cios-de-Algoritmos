<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Informe sua 3 notas:</label>
    <input type="text" id="ipt_nota1" placeholder="nota 1">
    <input type="text" id="ipt_nota2" placeholder="nota 2">
    <input type="text" id="ipt_nota3" placeholder="nota 3">

    <br><br>

    <button onclick="calcular()">Analisar desemprenho</button>

    <br><br><br>

    <div id="resultado"></div>
    <div id="resultadoForaDeSerie"></div>

</body>
<script>
    function calcular(){
        let nota1 =Number(ipt_nota1.value);
        let nota2 =Number(ipt_nota2.value);
        let nota3 =Number(ipt_nota3.value);

        let media = (nota1 + nota2 + nota3) / 3;

        resultado.innerHTML = `Sua média foi de ${media.toFixed(2)}`;

        if (media >= 9.4) {
            resultadoForaDeSerie.innerHTML = `Parabéns, você é fora de série!`;
        }
        else {
            resultadoForaDeSerie.innerHTML = ``;
        }

    }
</script>
</html>
