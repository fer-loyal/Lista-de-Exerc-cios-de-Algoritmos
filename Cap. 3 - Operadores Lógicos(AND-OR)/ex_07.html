<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>Informe a quantidade de passagens que deseja adquirir:</div>
    <input type="text" id="ipt_qtd_passagens" placeholder="quantidade de passagens">

    <br><br>

    <button onclick="verificar()">Comprar</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function verificar() {
        let QtdPassagens = Number(ipt_qtd_passagens.value);

        let valorPassagem = 4.40;
        let valorFinal = QtdPassagens * valorPassagem;

        if ( QtdPassagens < 8 || QtdPassagens > 50) {
            alert(`Quantidade inválida para o Fidelidade!`);
        }

        else if ( QtdPassagens > 8 && QtdPassagens < 19) {
            let desconto = valorFinal * 0.03;
            resultado.innerHTML = `Total a pagar: R$${desconto.toFixed(2)}`;
        }

        else if (QtdPassagens > 20 && QtdPassagens <= 49) {
            let desconto = valorFinal * 0.05;
            resultado.innerHTML = `Total a pagar: R$${desconto.toFixed(2)}`;
        }

        else if (QtdPassagens == 50 ) {
            let desconto = valorFinal * 0.07;
            resultado.innerHTML = `Total a pagar: R$${desconto.toFixed(2)}`;
        }
    
    }
</script>
</html>
