<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Qual o modo de pagamento?</label>
    <select id="select_modo_pagamento">
        <option value="dinheiro">Dinheiro</option>
        <option value="debito">Cartão de débito</option>
        <option value="credito">Cartão de crédito</option>
        <option value="boleto">Boleto</option>
    </select>

    <br><br>

    <button onclick="analisar()">Analisar Compra</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function analisar() {

        let modoPagamento = select_modo_pagamento.value;

        if ( modoPagamento == "dinheiro" || modoPagamento == "debito") {
            resultado.innerHTML = `Você terá que pagar a vista`;
        }

        else {
            resultado.innerHTML = `Pagamento poderá ser parcelado`;
        }
    }
</script>
</html>
