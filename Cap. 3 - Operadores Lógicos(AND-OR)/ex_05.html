<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="ipt_nota_aluno" placeholder="nota do aluno">

    <br><br>

    <button onclick="avaliar()">Avaliar aluno</button>
</body>
<script>
    function avaliar() {
        let nota = Number(ipt_nota_aluno.value);

        if (nota < 6) {
            alert(`Aluno não aprovado!`);
        }

        else if (nota > 8.5 && nota <= 10) {
            alert(`Aluno Exemplar!`);
        }

        else if ( nota > 6 && nota < 8.5 ) {
            alert(`Aluno comum e aprovado`);
        }
    }
</script>
</html>
