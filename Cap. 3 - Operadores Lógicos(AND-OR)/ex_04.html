<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>A qual hora do dia você costuma acessar a Netflix?</label>
    <input type="text" id="ipt_horario" placeholder="insira aqui">

    <br><br>

    <button onclick="ver()">Ver recomendação</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function ver() {
        let horario = Number(ipt_horario.value);

        if (horario < 21 && horario > 19) {
            resultado.innerHTML = `Não é recomendável que você assista sua série favorita no horário ${horario}h!`;
        }

        else {
            resultado.innerHTML = `O horário ${horario}h é adequado para assistir sua série favorita!`;
        }
    }
</script>
</html>
