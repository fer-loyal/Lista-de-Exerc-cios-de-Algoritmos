<body>

    <input type="text" id="ipt_senha" placeholder="Senha">

</body>
<script>
    function autenticar() {
        let login = ipt_login.value;
        let senha = ipt_senha.value;
        let info = ipt_info_pessoal.value;

        if ( senha == "ana" && login == "braga" && ( info == "1949" || info == "louro josé") ) {
            alert(`Usuário autenticado`);
        }

        else {
            alert(`Falha na autenticação`);
        }
    }
</script>
