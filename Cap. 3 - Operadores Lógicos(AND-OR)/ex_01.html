<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Qual a temperatura atual?</label>
    <input type="text" id="ipt_temperatura">

    <br><br>

    <button onclick="ver()">Ver situação...</button>

</body>
<script>
    function ver() {
        let temperatura = Number(ipt_temperatura.value)

        if ( temperatura > 21 && temperatura < 24) {
            alert(`Temperatura confortável :D`);
        }

        else {
            alert (`Temperatura DESCONFORTÁVEL`);
        }
    }
</script>
</html>
