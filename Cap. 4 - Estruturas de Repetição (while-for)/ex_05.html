<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="ipt_numero" placeholder="Número entre 0 e 200">

    <br><br>

    <button onclick="mostrar()">Viva o 7!</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function mostrar() {
        let num = Number(ipt_numero.value);
        resultado.innerHTML = ``;

        if ( num < 0 || num > 200 ){
            console.log("Voltou")
            return;
        }

        for ( let i = 0 ; i <= num ; i++) {
            if ( i % 7 == 0 || i == num ) { /* para adicionar o numero aqui, o i precisa ser <= ao numero inserido! */
                resultado.innerHTML += `${i} <br>`;
            }
        }

    }
</script>
</html>
