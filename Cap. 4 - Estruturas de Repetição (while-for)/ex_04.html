<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="ipt_numero" placeholder="Número entre 20 e 100">

    <br><br>

    <button onclick="mostrar()">Adoro múltipos de 5</button>

    <br><br>

    <div id="resultado"></div>

</body>
<script>
    function mostrar() {
        let num = Number(ipt_numero.value);
        resultado.innerHTML = ``;

        if ( num < 20 || num > 100 ){
            console.log("Voltou")
            return;
        }

        for ( let i = 0 ; i < num ; i++) {
            if ( i % 5 == 0) {
                resultado.innerHTML += `${i} <br>`;
            }
        }

    }
</script>
</html>
