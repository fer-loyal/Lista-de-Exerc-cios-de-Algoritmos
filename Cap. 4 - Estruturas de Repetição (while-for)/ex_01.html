<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EX01</title>
</head>
<body>
    <label>Qual o nome da pessoa que o usuário mais ama na vida?</label>
    <input type="text" id="ipt_nome">

    <br><br>

    <label>O quanto você a ama?</label>
    <input type="text" id="ipt_qtd_amor">

    <br><br>

    <button onclick="expressar()">Expressar amor</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function expressar() {
        resultado.innerHTML = ``;

        let nome = ipt_nome.value;
        let amor = Number(ipt_qtd_amor.value);

        for (let i = 1 ; i <= amor ; i++) {
            resultado.innerHTML += ` ${i}- ${nome}, eu te amo! Sempre lembre disso! <br>`;
        }

    }
</script>
</html>
