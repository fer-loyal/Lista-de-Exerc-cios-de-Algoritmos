<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Insira um número:</label>
    <input type="text" id="ipt_numero">

    <br>

    <label>Indira uma frase:</label>
    <input type="text" id="ipt_frase">

    <br><br>

    <button onclick="ver()">Papagaio</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function ver() {
        let numero = Number(ipt_numero.value);
        let frase = ipt_frase.value;

        resultado.innerHTML = ``;

        for ( i = 0 ; i < numero ; i++ ) {
            resultado.innerHTML += `${frase} `;
        }
    }
</script>
</html>
