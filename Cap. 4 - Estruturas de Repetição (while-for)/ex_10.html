<!DOCTYPE html>

<head>

</head>
<body>
    <input type="text" id="ipt_qtd_pessoas" placeholder="Informe quantas pessoas vão entrar no carro">

    <br><br>

    <button onclick="carona()">#PartiuCarona</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function carona() {
        let qtdPessoas = Number(ipt_qtd_pessoas.value);
        resultado.innerHTML = ``;

        for ( let i = 1 ; i <= qtdPessoas ; i++ ) {
            passageiro = i;

            if ( i == 1 ) {
                resultado.innerHTML += `Entrou o ${i}º passageiro (que é o(a) motorista) <br>`;
            }

            else if ( i <= 5 ) {
                resultado.innerHTML += ` Entrou o ${i}º passageiro <br>`;
            }

            else if ( i > 5 ) {
                resultado.innerHTML += ` O ${i}º passageiro terá que esperar! <br> `;
            }
        }
    }
</script>
