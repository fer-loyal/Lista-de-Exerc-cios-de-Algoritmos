<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="mostrar()">Números cabalísticos</button>

    <br><br>

    <div id="resultado"></div>
</body>
<script>
    function mostrar() {
        resultado.innerHTML = ``;

        for ( let i = 1 ; i <= 30 ; i++ ) {
             
            if ( i !== 3 && i !== 4 && i !== 7 && i!= 10 && i !==12 ) {
                resultado.innerHTML += `${i} <br>`;
            }
        } 
    }
</script>
</html>
